<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Acceder — Community Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--surface:#0e1020;--border:#1e2240;
  --accent:#5c6eff;--accent2:#ff4f8b;--text:#e8eaff;--muted:#6a6f9a;
  --err:#ff5c5c;--ok:#4fff9a
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}

.bg-glow{position:fixed;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(92,110,255,.12) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

.box{
  position:relative;width:100%;max-width:420px;
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:2.5rem;box-shadow:0 32px 80px rgba(0,0,0,.5)
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.1em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:.4rem}
.box-title{font-size:1.4rem;font-weight:500;margin-bottom:.3rem}
.box-sub{font-size:.875rem;color:var(--muted);margin-bottom:2rem}

.tabs{display:flex;gap:.5rem;margin-bottom:2rem;background:var(--bg);
  padding:.3rem;border-radius:10px;border:1px solid var(--border)}
.tab{flex:1;padding:.5rem;text-align:center;border-radius:7px;cursor:pointer;
  font-size:.875rem;font-weight:500;color:var(--muted);transition:all .2s;border:none;background:none}
.tab.active{background:var(--accent);color:#fff}

label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.35rem;letter-spacing:.04em}
input{
  width:100%;padding:.75rem 1rem;background:var(--bg);
  border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;
  margin-bottom:1.1rem;outline:none;transition:border .2s}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}

.btn{
  width:100%;padding:.8rem;border-radius:10px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;
  background:var(--accent);color:#fff;transition:all .2s;margin-top:.3rem}
.btn:hover{background:#7285ff;transform:translateY(-1px);box-shadow:0 8px 24px rgba(92,110,255,.35)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

.msg{margin-top:1rem;padding:.7rem 1rem;border-radius:8px;font-size:.85rem;display:none}
.msg.err{background:rgba(255,92,92,.12);border:1px solid rgba(255,92,92,.3);color:var(--err)}
.msg.ok{background:rgba(79,255,154,.1);border:1px solid rgba(79,255,154,.25);color:var(--ok)}
.msg.show{display:block}

.back{display:block;text-align:center;margin-top:1.5rem;
  font-size:.82rem;color:var(--muted);text-decoration:none}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="box">
  <div class="logo">COMMUNITY HUB</div>
  <div class="box-title" id="form-title">Bienvenido de nuevo</div>
  <div class="box-sub" id="form-sub">Inicia sesión en tu comunidad</div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('login')">Entrar</button>
  </div>

  <!-- LOGIN -->
  <div id="tab-login">
    <label>Correo electrónico</label>
    <input type="email" id="l-email" placeholder="tú@ejemplo.com"/>
    <label>Contraseña</label>
    <input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn" id="btn-login" onclick="doLogin()">Iniciar sesión</button>
  </div>

  <!-- REGISTER -->
  <div id="tab-register" style="display:none">
    <label>Nombre</label>
    <input type="text" id="r-name" placeholder="Tu nombre"/>
    <label>Correo electrónico</label>
    <input type="email" id="r-email" placeholder="tú@ejemplo.com"/>
    <label>Contraseña</label>
    <input type="password" id="r-pass" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')doRegister()"/>
    <button class="btn" id="btn-register" onclick="doRegister()">Crear cuenta</button>
  </div>

  <div class="msg" id="msg"></div>
  <a href="index.html" class="back">← Volver al inicio</a>
</div>

<script>
// ── CONFIG ──────────────────────────────────
const SUPABASE_URL  = 'https://gkuuwuqwumoorqmqkuka.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdXV3dXF3dW1vb3JxbXFrdWthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjUwMDksImV4cCI6MjA5MDQ0MTAwOX0.ME8C09iSbowqcak2Bezbd4otWzTXyR3bV8kf4hfodUg';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// Si ya hay sesión, redirige
sb.auth.getSession().then(({data:{session}})=>{
  if(session) location.href='app.html';
});

// Detectar hash #register
if(location.hash==='#register') setTab('register');

function setTab(t){
  document.getElementById('tab-login').style.display    = t==='login'    ? '' : 'none';
  document.getElementById('tab-register').style.display = t==='register' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='login'?0:1)));
  document.getElementById('form-title').textContent = t==='login' ? 'Bienvenido de nuevo' : 'Únete a la comunidad';
  document.getElementById('form-sub').textContent   = t==='login' ? 'Inicia sesión en tu comunidad' : 'Crea tu cuenta gratuita';
  hideMsg();
}

function showMsg(text,type){
  const el=document.getElementById('msg');
  el.textContent=text; el.className=`msg ${type} show`;
}
function hideMsg(){document.getElementById('msg').className='msg'}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass =document.getElementById('l-pass').value;
  if(!email||!pass){showMsg('Rellena todos los campos','err');return}
  const btn=document.getElementById('btn-login');
  btn.disabled=true;btn.textContent='Entrando…';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showMsg(error.message,'err');btn.disabled=false;btn.textContent='Iniciar sesión'}
  else location.href='app.html';
}

async function doRegister(){
  const name =document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass =document.getElementById('r-pass').value;
  if(!name||!email||!pass){showMsg('Rellena todos los campos','err');return}
  if(pass.length<6){showMsg('Contraseña mínimo 6 caracteres','err');return}
  const btn=document.getElementById('btn-register');
  btn.disabled=true;btn.textContent='Creando cuenta…';
  const {error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error){showMsg(error.message,'err');btn.disabled=false;btn.textContent='Crear cuenta'}
  else showMsg('¡Cuenta creada! Revisa tu correo para confirmar.','ok');
}
</script>
</body>
</html>
